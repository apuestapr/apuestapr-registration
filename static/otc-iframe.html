<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OTC/Omnichannel API example - Operator Playercard</title>
  </head>

  <body style="background-color: #fff; color: #0d0d0d; margin:0; height: 65px;">
    <div
      style="display: flex; justify-content: space-between; align-items: center; background: rgb(242, 236, 236); padding: 0px 30px;height: 100%;"
    >
      <p style="font-size: 24px" id="demo-text"></p>
      <p style="font-size: 24px" id="bet-placed-counter"></p>
      <button
        id="logout-btn"
        style="background: #00C4DE;color: white;padding: 15px;border-radius: 10px;font-size: 14px;border: none; display:none; cursor: pointer;"
      >
        Logout
      </button>
    </div>

    <script>
      const mapCardToPlayerId = track1 => {
        // Create a player ID by just appending a prefix, and getting rid of whitespace
        // A real implementation would call into a backend system to do the mapping
        return "test_" + track1.replace(/\s/g, "_");
      };

      let playerId;
      let betsCounter;
      let isSessionActive = false;
      let lastPathname = null;
      // Helper method for demo purpose only
      const setText = text => {
        document.getElementById("demo-text").innerHTML = text;
      };

      const resetIframe = () => {
        betsCounter = 0;
        document.getElementById("logout-btn").style.display = "none";
        document.getElementById("bet-placed-counter").innerHTML = "";
        setText("Card Swiped!");
      };

      const setBetPlacedCount = text => {
        document.getElementById("bet-placed-counter").innerHTML = text;
      };

      window.otcApiLoaded = async otcApi => {
        window.otcApi = otcApi;

        const terminalInfo = await window.otcApi.initialize({
          initialPosition: "HIDDEN",
        });

        console.log("TerminalInfo", terminalInfo);

        window.otcApi.on("DATALAYER_PUSHED", data => {
          console.log("Datalayer pushed", data);
        });

        window.otcApi.on("CARD_READ", cardData => {
          if (isSessionActive) return;
          playerId = mapCardToPlayerId(cardData.cardData[0]);

          resetIframe();

          // In this case we will display the window to the left when we
          // are going to start a session.
          window.otcApi.setPosition("TOP");

          // If the card data was matched with a player ID.
          if (playerId) {
            window.otcApi
              .startIdentifiedSession({
                playerId: playerId,
              })
              .then(() => {
                // For demo purpose - we are parsing and displaying a text
                // from the playercard, that we can identify as a player name.
                const parsedData = cardData.cardData[0].replace("^", " ");
                const playerName = parsedData.split(" ")[0];

                setText(`Welcome, ${playerName}`);
                setBetPlacedCount("Bets: 0");
                isSessionActive = true;
                document.getElementById("logout-btn").style.display = "block";
              })
              .catch(() => {
                setText("Couldn't able to start Player OTC session");

                setTimeout(() => {
                  window.otcApi.setPosition("HIDDEN");
                }, 3000);
              });
          } else {
            setText("Unable to find playerId, Try Swiping Again!");
            setTimeout(() => {
              window.otcApi.setPosition("HIDDEN");
            }, 3000);
          }
        });

        window.otcApi.on("LOGOUT", () => {
          console.log("logout emmited!!!");
          document.getElementById("logout-btn").style.display = "none";
          setText("Please swipe loyalty card if applicable");
          setBetPlacedCount("");
          isSessionActive = false;
          betsCounter = 0;
          playerId = null;
        });

        window.otcApi.on("BET_PLACED", () => {
          betsCounter += 1;
          setBetPlacedCount(`Bets: ${betsCounter}`);
        });

        /* Showing and hiding iframe when entering and leaving /sportsbook* location */
        window.otcApi.on("LOCATION_CHANGE", payload => {
          const { pathname } = payload;
          if (pathname && lastPathname) {
            if (
              pathname.startsWith("/sportsbook") &&
              !lastPathname.startsWith("/sportsbook")
            ) {
              window.otcApi.setPosition("TOP");
              setText("Please swipe loyalty card if applicable");
            } else if (
              (!pathname.startsWith("/sportsbook") &&
                lastPathname.startsWith("/sportsbook")) ||
              pathname.startsWith("/sportsbook/bethistory") // This is the path used when viewing bethistory for SST and OTC bets
            ) {
              window.otcApi.setPosition("HIDDEN");
            }
          }
          lastPathname = pathname;
        });
      };

      const validateApiUrl = urlString => {
        const url = new URL(urlString);
        if (
          !url.hostname.endsWith("kambicdn.com") &&
          !url.hostname.endsWith("kambi.com") &&
          url.hostname !== "localhost"
        ) {
          throw new Error(`invalid OTC API URL ${urlString}`);
        }
      };

      const omnichannelApiUrl = new URL(location).searchParams.get(
        "omnichannelApiUrl",
      );

      if (omnichannelApiUrl) {
        console.log("API found");
        const jsApiUrl = decodeURIComponent(omnichannelApiUrl);

        // Important to be able to trust this URL.
        validateApiUrl(jsApiUrl);

        const scriptElement = document.createElement("script");
        scriptElement.src = `${jsApiUrl}?cacheBlocker=${Date.now()}`;
        document.head.appendChild(scriptElement);
      }

      document
        .getElementById("logout-btn")
        .addEventListener("click", async () => {
          try {
            await window.otcApi.logout({ playerId });
            playerId = null;
          } catch (err) {
            setText("Failed to Logout, try again!");
          }
        });
    </script>
  </body>
</html>
